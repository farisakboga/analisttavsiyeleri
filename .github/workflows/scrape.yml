name: Analist Tavsiyeleri Güncelle

on:
  schedule:
    - cron: '0,30 * * * *'
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Repoyu klonla
        uses: actions/checkout@v4

      - name: Python kur
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Bagimlilikları yukle
        run: |
          pip install playwright pandas
          playwright install chromium
          playwright install-deps chromium

      - name: Sayfa debug
        run: |
          python3 - << 'PYEOF'
import asyncio
from playwright.async_api import async_playwright

async def main():
    async with async_playwright() as p:
        browser = await p.chromium.launch(
            headless=True,
            args=["--disable-blink-features=AutomationControlled"]
        )
        context = await browser.new_context(
            viewport={"width": 1280, "height": 800},
            user_agent="Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/125.0.0.0 Safari/537.36",
            locale="tr-TR",
            timezone_id="Europe/Istanbul",
        )
        await context.add_init_script("Object.defineProperty(navigator, 'webdriver', {get: () => undefined})")
        page = await context.new_page()

        resp = await page.goto("https://fintables.com/analist-tavsiyeleri", wait_until="domcontentloaded", timeout=60000)
        print(f"HTTP status: {resp.status}")
        await page.wait_for_timeout(6000)

        html = await page.content()
        print(f"HTML uzunlugu: {len(html)}")

        tr = await page.locator("tbody tr").count()
        print(f"tbody tr: {tr}")

        with open("debug_page.html", "w", encoding="utf-8") as f:
            f.write(html)
        print("debug_page.html kaydedildi")

        await browser.close()

asyncio.run(main())
PYEOF

      - name: Debug HTML artifact yukle
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: debug-html
          path: debug_page.html
          if-no-files-found: ignore

      - name: Scraper calistir
        run: python scraper.py

      - name: JSON commit et
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/analist_tavsiyeleri.json
          git diff --staged --quiet || git commit -m "veri guncellendi: $(date -u '+%Y-%m-%d %H:%M') UTC"
          git push
